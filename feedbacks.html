<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice Feedback Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: rgb(192, 231, 241);
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            padding: 24px;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body class="flex flex-col relative min-h-screen text-[#0f172a] p-8">

    <div class="max-w-5xl mx-auto w-full">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <h1 class="text-3xl font-bold text-[#1e293b]">Feedback Submissions</h1>
        </div>
        
        <!-- Feedbacks Grid -->
        <div id="feedbacks-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Loading State -->
            <div class="col-span-full flex justify-center py-12">
                <svg class="animate-spin h-8 w-8 text-[#009485]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>
    </div>

    <script>
        async function loadFeedbacks() {
            const container = document.getElementById('feedbacks-container');
            try {
                const response = await fetch('http://localhost:8000/alice-feedbacks');
                const result = await response.json();
                
                if (result.status === 'success' && result.data.length > 0) {
                    container.innerHTML = ''; // Clear loading spinner
                    
                    result.data.forEach(feedback => {
                        const dateObj = new Date(feedback.created_at);
                        const dateStr = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                        const timeStr = dateObj.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
                        
                        const card = document.createElement('div');
                        card.className = 'card flex flex-col justify-between';
                        card.innerHTML = `
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <h3 class="font-bold text-lg text-[#009485]">${feedback.name}</h3>
                                        <a href="mailto:${feedback.email}" class="text-sm text-slate-500 hover:text-[#009485] transition-colors">${feedback.email}</a>
                                    </div>
                                    <span class="text-xs font-medium text-slate-500 bg-slate-100/80 px-2 py-1.5 rounded-lg border border-slate-200/50 whitespace-nowrap">
                                        ${dateStr} ${timeStr}
                                    </span>
                                </div>
                                <div class="w-full h-px bg-slate-100 my-4"></div>
                                <p class="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm">${feedback.message}</p>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else if (result.data.length === 0) {
                    container.innerHTML = '<div class="text-center col-span-full text-slate-500 py-12 bg-white/50 rounded-2xl border border-white">No feedbacks have been submitted yet.</div>';
                }
            } catch (error) {
                console.error('Error fetching feedbacks:', error);
                container.innerHTML = '<div class="text-center col-span-full text-red-500 py-12 bg-white/50 rounded-2xl border border-white shadow-sm">Error loading feedbacks. Make sure the API server is running on port 8000.</div>';
            }
        }

        // Initialize fetch on page load
        loadFeedbacks();
    </script>
</body>
</html>
